# Dependabot version updates.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
#
# Scope: Python dependencies (pyproject.toml + uv.lock) and the GitHub Actions
# used in CI. The container base images live in `Containerfile`, which Dependabot
# does not auto-detect, so Docker updates are intentionally not configured here.
version: 2
updates:
  # Python dependencies, managed by uv (pyproject.toml + uv.lock).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Batch minor/patch bumps into one PR; majors still open individually.
      minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions referenced in .github/workflows/.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        update-types:
          - "minor"
          - "patch"
