name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --extra desktop
      - name: Lint
        run: uv run ruff check sprint_pulse tests
      - name: Run tests
        run: uv run pytest -v
